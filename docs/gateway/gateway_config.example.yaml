# Example IM gateway server configuration
#
# TWO modes are supported:
#
#   Mode A — Feishu long-connection (RECOMMENDED, no public IP needed):
#     agx feishu --app-id cli_xxx --app-secret yyy
#     or: FEISHU_APP_ID=cli_xxx FEISHU_APP_SECRET=yyy agx feishu
#
#   Mode B — Webhook gateway (requires public IP/domain):
#     agx gateway -c gateway_config.yaml
#
# Author: Damon Li

# ── Mode A: Feishu long-connection ──────────────────────────────────────────
# Run with: agx feishu --app-id <APP_ID> --app-secret <APP_SECRET>
# Or set env vars:
#   export FEISHU_APP_ID=cli_a9f7680d09389bef
#   export FEISHU_APP_SECRET=your_app_secret
#   export AGX_STUDIO_BASE_URL=http://127.0.0.1:8000  # default
#   agx feishu
#
# Feishu app requirements:
#   - Bot capability enabled
#   - Event: im.message.receive_v1 (long-connection mode)
#   - Permission: im:message, im:message:send_as_bot, im:message.receive_event

# ── Mode B: Webhook gateway server ──────────────────────────────────────────
server:
  host: "0.0.0.0"
  port: 8081

reply_timeout_seconds: 300

# Optional: Siri / HTTP POST /api/command uses this header instead of per-device token
# command_api_secret: "your-shared-secret"

adapters:
  feishu:
    enabled: false
    app_id: "cli_xxxxxx"
    app_secret: "xxxxxxxxxxxx"
    encrypt_key: ""               # Leave empty if Encrypt Key is disabled in Feishu console
    verification_token: "xxxxxxxxxxxx"

  wecom:
    enabled: false
    corp_id: "wwxxxxxxxxxx"
    agent_id: 1000002
    secret: "xxxxxxxxxxxx"
    token: "xxxxxxxxxxxx"
    encoding_aes_key: "xxxxxxxxxxxx"

  dingtalk:
    enabled: false
    app_secret: "xxxxxxxxxxxx"

devices:
  auth_tokens:
    - device_id: "my-macbook"
      token: "replace-with-long-random"
      # Required for Machi「扫码连接」: POST /api/connect/session reuses this code
      binding_code: "882291"
